{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Caregiver Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{% static 'css/styles.css' %}">
</head>
<body>

    <div class="auth-container">
        <div class="auth-card">
            
            <div class="text-center mb-4">
                <h2 class="auth-title">Log in!</h2>
                <p class="text-muted small">Welcome! Please sign in to your account.</p>
            </div>

            {% if messages %}
                 {% for message in messages %}
                        <div class="alert alert-danger p-2 small text-center mb-3" role="alert">
                         {{ message }}
                     </div>
                {% endfor %}
            {% endif %}

            <form method="POST" action="">
                {% csrf_token %} <div class="mb-3">
                    <label for="email" class="form-label small fw-bold">Email</label>
                    <input type="text" name="email" id="email" class="form-control" placeholder="email@example.com" required>
                </div>

                <div class="mb-4">
                    <div class="d-flex justify-content-between">
                        <label for="password" class="form-label small fw-bold">Password</label>
                        
                    </div>
                    <input type="password" name="password" id="password" class="form-control" placeholder="" required>
                </div>

                <button type="submit" class="btn btn-sky-blue w-100 py-2 mb-3">Sign In</button>
            </form>

            <div class="text-center mt-3 small">
                <span class="text-muted">New to the platform?</span>
                <a href="/signup/" class="auth-footer-link fw-bold ms-1">Create an account</a>
            </div>

        </div>
    </div>

</body>
</html>
