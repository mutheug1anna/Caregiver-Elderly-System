{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Caregiver Registration</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{% static 'css/styles.css' %}">
</head>
<body>

    <div class="auth-container">
        <div class="auth-card">
            <h2 class="text-center mb-4" style="color: #007bb8;">Sign Up!</h2>
            <form method="POST">
                {% csrf_token %}
                <div class="mb-3">
                    <label class="form-label small fw-bold">Full Name</label>
                    <input type="text" name="fullName" class="form-control" placeholder="John Doe" required>
                </div>
                <div class="mb-3">
                    <label class="form-label small fw-bold">Email Address</label>
                    <input type="email" name="email" class="form-control" placeholder="john@example.com" required>
                </div>
                <div class="mb-3">
                    <label class="form-label small fw-bold">Password</label>
                    <input type="password" name="password" class="form-control" placeholder="" required>
                </div>
                <div class="mb-4">
                    <label class="form-label small fw-bold">Confirm Password</label>
                    <input type="password" name="confirmPassword" class="form-control" placeholder="" required>
                </div>
                <button type="submit" class="btn btn-sky-blue w-100 py-2 mb-3">Register Account</button>
                <div class="text-center mt-3 small">
                <span class="text-muted">Already have an account?</span>
                <a href="/login/" class="auth-footer-link fw-bold ms-1">Log In</a>
            </div>
            </form>
        </div>
    </div>

</body>
</html>
